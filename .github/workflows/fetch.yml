name: Fetch Daily Positive Energy

on:
  schedule:
    # 每天 UTC 18:00 跑(北京时间凌晨 2 点) — 与 Vercel Cron 错开,任一跑通就行
    - cron: "0 18 * * *"
  workflow_dispatch:        # 手动触发,可在 Actions 页面点 "Run workflow"
  push:
    paths: ["config.json"]  # 改了配置也触发一次

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "npm"

      - name: Install
        run: npm ci --no-audit --no-fund

      - name: Run fetcher
        run: node scripts/fetch.js

      - name: Commit & push if changed
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          if git diff --quiet public/data/contents.json; then
            echo "No content changes."
            exit 0
          fi
          git add public/data/contents.json
          msg="chore(data): daily fetch @ $(date -u +'%Y-%m-%d %H:%M UTC')"
          git commit -m "$msg" || true
          git push
