name: Fetch Daily Positive Energy

on:
  schedule:
    - cron: "0 18 * * *"
  workflow_dispatch:
  push:
    paths: ["config.json"]

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 8
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm ci --no-audit --no-fund
      - run: node scripts/fetch.js
      - run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add public/data/contents.json
          git diff --cached --quiet || git commit -m "chore(data): daily fetch" && git push
