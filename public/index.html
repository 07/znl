<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>小确幸 · 每日正能量</title>
  <meta name="description" content="每天给你一点温柔的小确幸 — 暖心文字、治愈图文、励志视频。" />
  <link rel="icon" href="data:image/svg+xml,%3Csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'%3E%3Ctext y='.9em' font-size='90'%3E🌞%3C/text%3E%3C/svg%3E" />
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>
  <header class="hero">
    <div class="hero-inner">
      <div class="hero-badge">☀️ 今日 · <span id="today"></span></div>
      <h1 class="hero-title">愿你眼里有光,心里有暖</h1>
      <p class="hero-subtitle">每天给你一点温柔的小确幸 — 暖心文字 · 治愈图文 · 励志视频</p>
      <div class="hero-stats" id="stats">
        <span class="stat-pill">📝 <b id="stat-text">…</b> 段文字</span>
        <span class="stat-pill">🖼️ <b id="stat-image">…</b> 张图文</span>
        <span class="stat-pill">🎬 <b id="stat-video">…</b> 段视频</span>
      </div>
    </div>
    <div class="hero-deco" aria-hidden="true">
      <span>🌸</span><span>☁️</span><span>🌿</span><span>✨</span>
    </div>
  </header>

  <nav class="tabs" role="tablist">
    <button class="tab active" data-cat="text"        role="tab" aria-selected="true">📝 暖心文字</button>
    <button class="tab"        data-cat="image_text"  role="tab" aria-selected="false">🖼️ 治愈图文</button>
    <button class="tab"        data-cat="video"       role="tab" aria-selected="false">🎬 励志视频</button>
  </nav>

  <main class="container">
    <section id="panel-text"        class="panel active">
      <div class="grid" id="grid-text"></div>
    </section>
    <section id="panel-image_text"  class="panel">
      <div class="grid grid-2" id="grid-image_text"></div>
    </section>
    <section id="panel-video"       class="panel">
      <div class="grid grid-2" id="grid-video"></div>
    </section>
    <p id="empty" class="empty hidden">今天还没有内容,稍等一会儿再来 ☕️</p>
  </main>

  <!-- 文字详情 modal -->
  <div id="modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-mask" data-close></div>
    <div class="modal-card">
      <button class="modal-close" data-close aria-label="关闭">×</button>
      <h2 id="modal-title"></h2>
      <div class="modal-meta">
        <span id="modal-source"></span>
        <span id="modal-time"></span>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- 视频 modal -->
  <div id="video-modal" class="modal hidden" role="dialog" aria-modal="true">
    <div class="modal-mask" data-close></div>
    <div class="video-card">
      <button class="modal-close" data-close aria-label="关闭">×</button>
      <div class="video-frame">
        <iframe id="video-frame" allowfullscreen allow="autoplay; encrypted-media; picture-in-picture"></iframe>
      </div>
      <h3 id="video-title"></h3>
      <p id="video-desc"></p>
    </div>
  </div>

  <footer class="site-footer">
    <p>愿你的每一天,都有小确幸 🌷</p>
    <p class="footer-sub">自动更新于 <span id="updatedAt">—</span> · 内容来自公开网络</p>
  </footer>

  <script src="/js/app.js"></script>
</body>
</html>
